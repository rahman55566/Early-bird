workflows:
  android-workflow:
    name: Early Bird Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.19.6
    triggering:
      events:
        - push
    scripts:
      - name: Generate Android Support Files
        script: |
          flutter create . --platforms=android
          
      - name: Fix Android SDK 35 & Kotlin Version
        script: |
          # 1. Audioplayers கேட்கும் SDK 35 மற்றும் minSdkVersion 21-ஐ லோக்கல் பிராப்பர்ட்டீஸில் லாக் செய்கிறோம்
          echo "flutter.compileSdkVersion=35" >> android/local.properties
          echo "flutter.targetSdkVersion=35" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          
          # 2. பிரைமரி ஆப் ஃபைலில் பதிப்புகளை 35 ஆக உயர்த்துகிறோம்
          if [ -f android/app/build.gradle ]; then
            sed -i '' 's/compileSdkVersion.*/compileSdkVersion 35/g' android/app/build.gradle || true
            sed -i '' 's/targetSdkVersion.*/targetSdkVersion 35/g' android/app/build.gradle || true
            sed -i '' 's/minSdkVersion.*/minSdkVersion 21/g' android/app/build.gradle || true
            sed -i '' 's/flutter.minSdkVersion.*/21/g' android/app/build.gradle || true
            
            # ஆப் லெவலில் டூப்ளிகேட் லைப்ரரிகளை பிளாக் செய்கிறோம்
            echo "
            configurations.all {
                resolutionStrategy {
                    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                }
            }" >> android/app/build.gradle
          fi
          
          # 3. தம்பி, இங்கதான் முக்கிய மாற்றம்! ரூட் build.gradle-இல் Kotlin பதிப்பை 1.8.22 ஆகவும், SDK 35 ஆகவும் வலுக்கட்டாயமாக உயர்த்துகிறோம்!
          echo "
          buildscript {
              ext.kotlin_version = '1.8.22'
          }
          subprojects {
              ext.buildToolsVersion = '35.0.0'
              configurations.all {
                  resolutionStrategy {
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                  }
              }
          }" >> android/build.gradle

      - name: Get Flutter packages
        script: |
          flutter packages pub get
          
      - name: Build Android APK
        script: |
          flutter clean
          flutter packages pub get
          # 4. எர்ரர் இல்லாமல் பில்டு செய்யும் மாஸ்டர் கமாண்ட் தம்பி!
          flutter build apk --release --no-tree-shake-icons
          
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
