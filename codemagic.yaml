workflows:
  android-workflow:
    name: Early Bird Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    triggering:
      events:
        - push
    scripts:
      - name: Generate Android Support Files
        script: |
          # விடுபட்ட ஆண்ட்ராய்டு கட்டமைப்பை ஆட்டோமேட்டிக்காக உருவாக்கும் கட்டளை தம்பி
          flutter create . --platforms=android
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build Android APK
        script: |
          flutter build apk --release --no-pub
    artifacts:
      - build/app/outputs/flutter-apk/**.apk
