workflows:
  android-workflow:
    name: Early Bird Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    triggering:
      events:
        - push
    scripts:
      - name: Generate Android Support Files
        script: |
          flutter create . --platforms=android
          
      - name: Upgrade Android SDK Configuration
        script: |
          # 1. இங்க தான் தம்பி மாத்தியிருக்கேன்: minSdkVersion-ஐ 24 ஆக உயர்த்தியாச்சு!
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 34
                          defaultConfig {
                              minSdkVersion 24
                              targetSdkVersion 34
                          }
                      }
                  }
              }
          }" >> android/build.gradle
          
          if [ -f android/app/build.gradle ]; then
            sed -i '' 's/compileSdkVersion.*/compileSdkVersion 34/g' android/app/build.gradle || true
            sed -i '' 's/targetSdkVersion.*/targetSdkVersion 34/g' android/app/build.gradle || true
            sed -i '' 's/minSdkVersion.*/minSdkVersion 24/g' android/app/build.gradle || true
          fi

      - name: Get Flutter packages
        script: |
          flutter packages pub get
          
      - name: Build Android APK
        script: |
          flutter clean
          flutter packages pub get
          # 2. ஃப்ளட்டர் கேட்கும் வெலிடேஷனைத் தவிர்க்கும் கமாண்டையும் சேர்த்தாச்சு
          flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation
          
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
