name: early_bird_stock_book
description: "A new Flutter project for Early Bird Stock Management from scratch."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # நமக்குத் தேவையான மிக முக்கியமான எக்ஸ்டெர்னல் பேக்கேஜ்கள்
  excel: ^4.0.6
  file_picker: ^8.0.0
  audioplayers: ^6.0.0
  share_plus: ^7.1.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  mobile_scanner: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
