workflows:
  android-workflow:
    name: Early Bird Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    triggering:
      events:
        - push
    scripts:
      - name: Generate Android Support Files
        script: |
          flutter create . --platforms=android
          
      - name: Upgrade Android SDK Configuration
        script: |
          # SDK 34 மற்றும் minSdkVersion 23 ஆகக் குறைத்து பிளகின்களுடன் ஒத்துப்போக வைக்கிறோம்
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 34
                          defaultConfig {
                              minSdkVersion 23
                              targetSdkVersion 34
                          }
                      }
                  }
              }
          }" >> android/build.gradle
          
          if [ -f android/app/build.gradle ]; then
            sed -i '' 's/compileSdkVersion.*/compileSdkVersion 34/g' android/app/build.gradle || true
            sed -i '' 's/targetSdkVersion.*/targetSdkVersion 34/g' android/app/build.gradle || true
            sed -i '' 's/minSdkVersion.*/minSdkVersion 23/g' android/app/build.gradle || true
          fi

      - name: Get Flutter packages
        script: |
          flutter packages pub get
          
      - name: Build Android APK
        script: |
          # சுத்தமாக பழைய கேச் ஃபைல்களை நீக்கிவிட்டு பில்ட் செய்கிறோம்
          flutter clean
          flutter packages pub get
          flutter build apk --release --no-tree-shake-icons
          
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
