workflows:
  android-workflow:
    name: Early Bird Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.19.6
      # 1. தம்பி, இங்கதான் மாஸ்டர் பிளான்! கமாண்டுகளுக்குப் பதிலா சிஸ்டம் வழியாவே SDK 34-ஐ செட் பண்ணியாச்சு.
      android_sdk: 34
    triggering:
      events:
        - push
    scripts:
      - name: Generate Android Support Files
        script: |
          flutter create . --platforms=android
          
      - name: Fix Android Build Properties
        script: |
          # 2. சிக்கல் தரும் வரிகளைத் திருத்தாமல், local.properties ஃபைலில் நேரடியாக வேல்யூக்களைத் திணிக்கிறோம்
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties

      - name: Get Flutter packages
        script: |
          flutter packages pub get
          
      - name: Build Android APK
        script: |
          # 3. எர்ரர் வராமல் சுத்தமாக பில்ட் செய்யும் பகுதி
          flutter clean
          flutter packages pub get
          flutter build apk --release --no-tree-shake-icons
          
    artifacts:
      # 4. பில்டு முடிந்ததும் APK-ஐ டவுன்லோட் செய்ய வெளியே கொண்டு வரும் பகுதி
      - build/app/outputs/flutter-apk/*.apk
