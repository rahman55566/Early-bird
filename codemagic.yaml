workflows:
  android-workflow:
    name: Early Bird Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.19.6
    triggering:
      events:
        - push
    scripts:
      - name: Generate Android Support Files
        script: |
          flutter create . --platforms=android
          
      - name: Upgrade Android SDK Configuration
        script: |
          # சப்-ப்ராஜெக்ட்களை பாதுகாப்பாக 34 மற்றும் 21-க்கு மாற்றுகிறோம்
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 34
                          defaultConfig {
                              minSdkVersion 21
                              targetSdkVersion 34
                          }
                      }
                  }
              }
          }" >> android/build.gradle
          
          # இங்குதான் தம்பி எர்ரர் வராதபடி கமாண்டுகளைச் சுத்தமாக மாற்றியிருக்கிறேன்!
          if [ -f android/app/build.gradle ]; then
            sed -i '' 's/compileSdkVersion.*/compileSdkVersion 34/g' android/app/build.gradle || true
            sed -i '' 's/targetSdkVersion.*/targetSdkVersion 34/g' android/app/build.gradle || true
            sed -i '' 's/minSdkVersion.*/minSdkVersion 21/g' android/app/build.gradle || true
          fi

      - name: Get Flutter packages
        script: |
          flutter packages pub get
          
      - name: Build Android APK
        script: |
          flutter clean
          flutter packages pub get
          flutter build apk --release --no-tree-shake-icons
          
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
