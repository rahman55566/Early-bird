workflows:
  android-workflow:
    name: Early Bird Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    triggering:
      events:
        - push
    scripts:
      - name: Generate Android Support Files
        script: |
          flutter create . --platforms=android
          
      - name: Upgrade Android SDK Configuration
        script: |
          # 1. ஆண்ட்ராய்டு 34 மற்றும் புதிய ஃப்ளட்டர் விதிகளுக்கு ஏற்ப செட்டிங்ஸை மாற்றுதல்
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 34
                          defaultConfig {
                              minSdkVersion 24
                              targetSdkVersion 34
                          }
                      }
                  }
              }
          }" >> android/build.gradle
          
          if [ -f android/app/build.gradle ]; then
            sed -i '' 's/compileSdkVersion.*/compileSdkVersion 34/g' android/app/build.gradle || true
            sed -i '' 's/targetSdkVersion.*/targetSdkVersion 34/g' android/app/build.gradle || true
            sed -i '' 's/minSdkVersion.*/minSdkVersion 24/g' android/app/build.gradle || true
          fi

      - name: Get Flutter packages
        script: |
          flutter packages pub get
          
      - name: Build Android APK
        script: |
          # 2. பழைய கேச் ஃபைல்களை நீக்கிவிட்டு, புதிய கட்டுப்பாடுகளுடன் பில்ட் செய்தல்
          flutter clean
          flutter packages pub get
          flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation
          
    artifacts:
      # 3. பில்ட் முடிந்ததும் APK-ஐ டவுன்லோட் செய்ய உங்களிடம் கொண்டு சேர்க்கும் பகுதி
      - build/app/outputs/flutter-apk/*.apk
