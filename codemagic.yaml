workflows:
  android-workflow:
    name: Early Bird Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.19.6
    triggering:
      events:
        - push
    scripts:
      - name: Generate Android Support Files
        script: |
          flutter create . --platforms=android
          
      - name: Fix Android Build Properties
        script: |
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties

      - name: Get Flutter packages
        script: |
          flutter packages pub get
          
      - name: Build Android APK
        script: |
          flutter clean
          flutter packages pub get
          # தம்பி, சிக்கல் தந்த அந்த ஒரு கமாண்டை மட்டும் இங்கிருந்து தூக்கியாச்சு!
          flutter build apk --release --no-tree-shake-icons
          
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
