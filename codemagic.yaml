workflows:
  android-workflow:
    name: Early Bird Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    triggering:
      events:
        - push
    scripts:
      - name: Generate Android Support Files
        script: |
          flutter create . --platforms=android
      - name: Bypass Android SDK 36 Compile Issue
        script: |
          # தம்பி, அனைத்து பேக்கேஜ்களையும் புதிய SDK 36-க்கு மாற்றும் அண்ணனின் மேஜிக் கட்டளை!
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 36
                      }
                  }
              }
          }" >> android/build.gradle
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build Android APK
        script: |
          flutter build apk --release --no-pub
    artifacts:
      - build/app/outputs/flutter-apk/**.apk
