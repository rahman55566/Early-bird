workflows:
  android-workflow:
    name: Early Bird Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.19.6
    triggering:
      events:
        - push
    scripts:
      - name: Generate Android Support Files
        script: |
          flutter create . --platforms=android
          
      - name: Clean Fix for Android Configurations
        script: |
          # 1. SDK வெர்ஷன்களை லோக்கல் பிராப்பர்ட்டீஸில் மட்டும் செட் செய்கிறோம்
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties

          # 2. சிக்கல் இல்லாத நேரடி build.gradle ஃபைலை எழுதுகிறோம்
          cat << 'EOF' > android/build.gradle
          buildscript {
              ext.kotlin_version = '1.8.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          # 3. ஆப் லெவல் ஃபைலில் டூப்ளிகேட் எர்ரர் வராமல் தடுக்கிறோம் தம்பி
          cat << 'EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          android {
              namespace "com.example.earlybird"
              compileSdkVersion 34
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = '1.8'
              }
              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }
              defaultConfig {
                  applicationId "com.example.earlybird"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          flutter {
              source '../..'
          }
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
          }
          configurations.all {
              resolutionStrategy {
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
              }
          }
          EOF

      - name: Get Flutter packages
        script: |
          flutter packages pub get
          
      - name: Build Android APK
        script: |
          flutter clean
          flutter packages pub get
          # தேங்காமல் இருக்க நார்மல் ரிலீஸ் பில்ட் செய்கிறோம்
          flutter build apk --release
          
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
