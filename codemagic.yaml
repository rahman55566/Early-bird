workflows:
  android-workflow:
    name: Early Bird Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.19.6
    triggering:
      events:
        - push
    scripts:
      - name: Generate Android Support Files
        script: |
          flutter create . --platforms=android
          
      - name: Fix Android Build Properties
        script: |
          # 1. SDK பதிப்புகளை பிராப்பர்ட்டி ஃபைலில் செட் செய்கிறோம்
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          
          # 2. பிரைமரி ஆப் ஃபைலில் minSdkVersion-ஐ 21 ஆக மாற்றுகிறோம்
          if [ -f android/app/build.gradle ]; then
            sed -i '' 's/minSdkVersion.*/minSdkVersion 21/g' android/app/build.gradle || true
            sed -i '' 's/flutter.minSdkVersion.*/21/g' android/app/build.gradle || true
            
            # --- தம்பி, இங்கதான் முக்கிய மாற்றம்! ஆப் லெவல் ஃபைலிலும் டூப்ளிகேட் லைப்ரரிகளை பிளாக் செய்கிறோம் ---
            echo "
            configurations.all {
                resolutionStrategy {
                    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                }
            }" >> android/app/build.gradle
          fi
          
          # 3. ரூட் லெவல் build.gradle ஃபைலிலும் டூப்ளிகேட் விதிகளைச் சேர்க்கிறோம்
          echo "
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 34
                          defaultConfig {
                              minSdkVersion 21
                              targetSdkVersion 34
                          }
                      }
                  }
              }
              configurations.all {
                  resolutionStrategy {
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                  }
              }
          }" >> android/build.gradle

      - name: Get Flutter packages
        script: |
          flutter packages pub get
          
      - name: Build Android APK
        script: |
          flutter clean
          flutter packages pub get
          # 4. எர்ரர் இல்லாமல் சுத்தமாக பில்ட் செய்யும் பகுதி
          flutter build apk --release --no-tree-shake-icons
          
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
