workflows:
  android-workflow:
    name: Early Bird Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    triggering:
      events:
        - push
    scripts:
      - name: Generate Android Support Files
        script: |
          flutter create . --platforms=android
      - name: Bypass Android SDK 36 Compile Issue
        script: |
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 36
                      }
                  }
              }
          }" >> android/build.gradle
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build Android APK
        script: |
          flutter build apk --release --no-pub
          
          # தம்பி, பில்ட் ஆன ஏபிகே கோப்பை Codemagic-ன் மெயின் ரூட் பார்வைக்கே கொண்டு வரும் மாஸ்டர் அண்ணன் கட்டளை!
          mkdir -p build_output
          cp build/app/outputs/flutter-apk/app-release.apk build_output/Early_Bird_Stock_Book.apk
    artifacts:
      # இப்போ இந்த ஃபோல்டரிலிருந்து Codemagic கச்சிதமாக ஆப்பை எடுத்து உங்களிடம் கொடுத்துவிடும்ப்பா!
      - build_output/*.apk
